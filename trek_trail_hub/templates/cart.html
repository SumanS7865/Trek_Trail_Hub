<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Your Cart | TrekTrail Hub</title>
</head>

<body style="background: #121212; color: #fff; padding: 50px;">

    <h1>Your Booking Cart</h1>
    <a href="/">Back to Home</a>

    <div style="margin-top: 30px;">
        {% for item in cart_items %}
        <div
            style="background: #1f1f1f; padding: 20px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between;">
            <h3>{{ item.name }}</h3>
            <p>Rs. {{ item.price_per_day }} / day</p>
        </div>
        {% empty %}
        <p>Your cart is empty. Go rent some cool gears!</p>
        {% endfor %}
    </div>

    {% if cart_items %}
    <div style="margin-top: 20px;">
        <a href="#" class="btn">Proceed to Checkout</a>
    </div>
    {% endif %}

</body>

</html>
